<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600">
  <title>NSS Communicator — Import</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e17;
    }
    .import-container {
      width: 500px;
      max-width: 90%;
    }
    .nss-header {
      border-radius: 8px 8px 0 0;
    }
    .nss-section {
      background: #111827;
      border: 1px solid #1a2035;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 30px;
    }
    .drop-zone {
      border: 2px dashed #1a2035;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      margin-bottom: 20px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.05);
    }
    .drop-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    #import-status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .status-success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid #00ff88;
      color: #00ff88;
    }
    .status-error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid #ff4444;
      color: #ff6666;
    }
    
    .nss-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(2px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .nss-modal-card {
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.15);
    }
  </style>
</head>
<body>
  <div class="import-container">
    <header class="nss-header">
      <div class="nss-logo">
        <span class="nss-logo-icon">🔒</span>
        <div class="nss-logo-text">
          <h1>NSS Communicator</h1>
          <span class="nss-subtitle">Secure Import</span>
        </div>
      </div>
    </header>
    <section class="nss-section">
      <h2 class="nss-section-title" id="import-title">Import Key</h2>
      <p class="nss-muted" style="margin-bottom: 20px;" id="import-desc">Select an .nss public key file to add to your contacts.</p>
      
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📂</div>
        <p>Drag and drop file here<br>or click to browse</p>
        <input type="file" id="file-input" style="display: none;">
      </div>

      <div id="import-status"></div>
    </section>
  </div>

  <!-- Custom Modal -->
  <div id="nss-modal" class="nss-modal-overlay" style="display: none;">
    <div class="nss-card nss-modal-card">
      <h2 id="nss-modal-title" class="nss-modal-title"></h2>
      <div id="nss-modal-body" class="nss-modal-body"></div>
      <div class="nss-modal-actions">
        <button id="nss-modal-cancel" class="nss-btn nss-btn-ghost">Cancel</button>
        <button id="nss-modal-confirm" class="nss-btn nss-btn-primary">OK</button>
      </div>
    </div>
  </div>

  <script src="import.js"></script>
</body>
</html>
